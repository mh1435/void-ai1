<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID AI // RUNTIME</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="void-theme-dark">

  <div class="void-app-container">
    
    <!-- LEFT PANEL: SYSTEM CONTROLLER -->
    <aside class="void-sidebar-panel">
      <div class="void-branding-block">
        <h1 class="void-main-logo">VOID</h1>
        <div class="status-indicator-row">
          <span class="status-dot active"></span>
          <span class="status-log-text">NODE_M7_ACTIVE</span>
        </div>
      </div>

      <nav class="void-task-navigation">
        <a href="#" class="nav-item-link active" data-target="terminal">
          <div class="icon-frame-square"></div>
          <span class="nav-label-text">RUNTIME TERMINAL</span>
        </a>
        <a href="#" class="nav-item-link" data-target="gamehub">
          <div class="icon-frame-diamond">✦</div>
          <span class="nav-label-text">GAME HUB DATA</span>
        </a>
        <a href="#" class="nav-item-link" data-target="core">
          <div class="icon-frame-gear">⚙</div>
          <span class="nav-label-text">CORE OPTIONS</span>
        </a>
      </nav>
    </aside>

    <!-- RIGHT PANEL: WORKSPACE FOCUS AREA -->
    <main class="void-main-workspace">
      
      <!-- TOP STATUS BAR -->
      <header class="workspace-header">
        <h2 id="current-panel-title" class="workspace-title">GAME HUB</h2>
        <button class="void-btn widget-btn">+ MONITOR WIDGET</button>
      </header>

      <!-- CONTENT DISPLAY MATRIX -->
      <section class="workspace-content-viewport">
        
        <!-- ORIGINAL FLOATING LOG CARD -->
        <div class="void-log-card" id="core-status-card">
          <div class="log-card-header">VOID::CORE // INITIALIZED</div>
          <p class="log-card-body">
            System execution loops online. Ready for game compilation or tactical offline matrix optimization commands.
          </p>
        </div>

        <!-- DYNAMIC CONTENT ATTACHMENT POINT -->
        <div id="dynamic-view-root" class="view-hidden"></div>

        <!-- BACKEND FALLBACK LOG -->
        <div class="void-terminal-fallback">
          <p>No runtime monitor layout attached to active dashboard pipeline player.</p>
        </div>

      </section>

      <!-- SYSTEM INPUT FOOTER -->
      <footer class="workspace-footer-input">
        <div class="input-wrapper">
          <input type="text" id="terminal-query-input" placeholder="Query Matrix..." autocomplete="off">
          <button id="submit-query-btn" class="send-btn">➔</button>
        </div>
      </footer>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
